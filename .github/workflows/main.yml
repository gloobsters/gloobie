on: [push, pull_request]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        target: ['native', 'x86_64-windows', 'x86_64-linux-gnu', 'aarch64-linux-gnu']
        optimize: ['Debug', 'ReleaseSafe', 'ReleaseFast']
    name: Compile Build
    steps:
      - uses: actions/checkout@v3
      - uses: mlugg/setup-zig@v2
      - name: Build & Install
        run: zig build -Dtarget=${{ matrix.target }} install
      - name: Run Tests
        if: matrix.target == 'native'
        run: zig build -Dtarget=${{ matrix.target }} test
      - name: Upload Build
        if: matrix.os == 'ubuntu-latest' && matrix.target != 'native' && (matrix.mode == 'ReleaseSafe' || matrix.mode == 'Debug')
        uses: actions/upload-artifact@v4
        with:
          path: zig-out/bin
          name: ${{ matrix.target }} - ${{ matrix.mode }}
